<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Blossom</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background-color: #0b1a38; /* Dark blue background */
        color: #ff69b4; /* Pink text */
        font-family: 'Arial', sans-serif;
    }

    canvas#matrix {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 0;
    }

    #content {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        text-align: center;
        color: #ff69b4;
    }

    #countdown {
        font-size: 3em;
        margin-bottom: 20px;
    }

    #birthdayMessage {
        font-size: 2em;
        display: none;
        margin-top: 20px;
        max-width: 80%;
    }

    .curved-text {
        font-family: 'Great Vibes', cursive;
        font-size: 4em;
        font-weight: bold;
        margin: 0;
        line-height: 1.2;
    }

    #hearts {
        position: absolute;
        width: 100%;
        height: 100%;
        pointer-events: none;
        top: 0;
        left: 0;
    }

    .heart {
        position: absolute;
        width: 20px;
        height: 20px;
        background-color: pink;
        transform: rotate(45deg);
        animation: float 4s linear infinite;
    }

    .heart:before,
    .heart:after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        background-color: pink;
        border-radius: 50%;
    }

    .heart:before {
        top: -10px;
        left: 0;
    }

    .heart:after {
        left: 10px;
        top: 0;
    }

    @keyframes float {
        0% { transform: translateY(0) rotate(45deg); opacity:1;}
        100% { transform: translateY(-800px) rotate(45deg); opacity:0;}
    }
</style>
</head>
<body>
<canvas id="matrix"></canvas>

<div id="content">
    <div id="countdown">3</div>
    <h1 class="curved-text" id="birthdayTitle" style="display:none;">Happy 19th Birthday Blossom</h1>
    <div id="birthdayMessage">
        You walked into my life and turned ordinary days<br>
        into memories I never want to forget...<br>
        You make everything brighter and better.<br>
        Happy Birthday, my love.
    </div>
</div>

<div id="hearts"></div>

<script>
    // Matrix rain
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*";
    const fontSize = 16;
    const columns = Math.floor(width / fontSize);
    const drops = [];
    for (let x = 0; x < columns; x++) drops[x] = Math.random() * height;

    function drawMatrix() {
        ctx.fillStyle = "rgba(11,26,56,0.05)";
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = "#ff69b4";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 50);
    window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    });

    // Countdown
    let countdownNum = 3;
    const countdownEl = document.getElementById('countdown');
    const titleEl = document.getElementById('birthdayTitle');
    const messageEl = document.getElementById('birthdayMessage');
    const heartsContainer = document.getElementById('hearts');

    const countdownInterval = setInterval(() => {
        countdownEl.textContent = countdownNum;
        countdownNum--;
        if (countdownNum < 0) {
            clearInterval(countdownInterval);
            countdownEl.style.display = 'none';
            titleEl.style.display = 'block';
            launchFireworks();
            showMessageSequentially();
            generateHearts();
        }
    }, 1000);

    // Fireworks (simple)
    function launchFireworks() {
        for (let i = 0; i < 50; i++) {
            const fire = document.createElement('div');
            fire.style.position = 'absolute';
            fire.style.width = '5px';
            fire.style.height = '5px';
            fire.style.background = '#ff69b4';
            fire.style.borderRadius = '50%';
            fire.style.left = Math.random() * window.innerWidth + 'px';
            fire.style.top = Math.random() * window.innerHeight + 'px';
            document.body.appendChild(fire);
            setTimeout(() => { fire.remove(); }, 2000);
        }
    }

    // Sequential message display
    function showMessageSequentially() {
        const lines = messageEl.innerHTML.split('<br>');
        messageEl.innerHTML = '';
        messageEl.style.display = 'block';
        let index = 0;
        const interval = setInterval(() => {
            if (index >= lines.length) clearInterval(interval);
            else messageEl.innerHTML += lines[index] + '<br>';
            index++;
        }, 1000);
    }

    // Floating hearts
    function generateHearts() {
        for (let i = 0; i < 20; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.style.left = Math.random() * window.innerWidth + 'px';
            heart.style.animationDuration = (3 + Math.random()*2) + 's';
            heartsContainer.appendChild(heart);
        }
    }
</script>
</body>
</html>
